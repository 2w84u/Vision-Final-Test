name: Build Status

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-22.04
    env:
      IMAGE_NAME: ghcr.io/nuaa-xtyf/vision-final-test-dev-env
    strategy:
      fail-fast: false  # Ensure one failure doesn't cancel other jobs
      matrix:
        target: [standard_gcy, standard_hjy, standard_wwj, standard_yx, standard_zzy]

    steps:
    - uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull Build Image
      run: docker pull ${IMAGE_NAME}:latest

    - name: Configure CMake
      run: |
        docker run --rm --user root -v ${{ github.workspace }}:/workspaces/Vision-Final-Test -w /workspaces/Vision-Final-Test ${IMAGE_NAME}:latest /bin/bash -c "source /opt/ros/humble/setup.bash && source /opt/intel/openvino_2024/setupvars.sh && cmake -B build -DCMAKE_BUILD_TYPE=Release"

    - name: Build Target
      run: |
        docker run --rm --user root -v ${{ github.workspace }}:/workspaces/Vision-Final-Test -w /workspaces/Vision-Final-Test ${IMAGE_NAME}:latest /bin/bash -c "source /opt/ros/humble/setup.bash && source /opt/intel/openvino_2024/setupvars.sh && cmake --build build --target ${{ matrix.target }} --parallel"
